version: '3.8'

services:
  # Test execution environment
  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test-runner
    volumes:
      - ../:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=test
      - TEST_ENVIRONMENT=docker
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    depends_on:
      - postgres
      - redis
      - selenium-hub
    networks:
      - test-network
    command: npm run test

  # Selenium Grid Hub
  selenium-hub:
    image: selenium/hub:4.15.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      - GRID_MAX_SESSION=16
      - GRID_BROWSER_TIMEOUT=300
      - GRID_TIMEOUT=300
    networks:
      - test-network

  # Chrome Nodes
  chrome-node-1:
    image: selenium/node-chrome:4.15.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - HUB_HOST=selenium-hub
      - HUB_PORT=4444
      - NODE_MAX_INSTANCES=2
      - NODE_MAX_SESSION=2
    networks:
      - test-network

  chrome-node-2:
    image: selenium/node-chrome:4.15.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - HUB_HOST=selenium-hub
      - HUB_PORT=4444
      - NODE_MAX_INSTANCES=2
      - NODE_MAX_SESSION=2
    networks:
      - test-network

  # Firefox Node
  firefox-node:
    image: selenium/node-firefox:4.15.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - HUB_HOST=selenium-hub
      - HUB_PORT=4444
      - NODE_MAX_INSTANCES=2
      - NODE_MAX_SESSION=2
    networks:
      - test-network

  # Edge Node
  edge-node:
    image: selenium/node-edge:4.15.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - HUB_HOST=selenium-hub
      - HUB_PORT=4444
      - NODE_MAX_INSTANCES=2
      - NODE_MAX_SESSION=2
    networks:
      - test-network

  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: test-postgres
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d
    networks:
      - test-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: test-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - test-network

  # MongoDB (for test data)
  mongodb:
    image: mongo:7
    container_name: test-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=testuser
      - MONGO_INITDB_ROOT_PASSWORD=testpass
      - MONGO_INITDB_DATABASE=testdb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - test-network

  # Test Application (Mock API)
  test-app:
    build:
      context: ../test-app
      dockerfile: Dockerfile
    container_name: test-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://testuser:testpass@postgres:5432/testdb
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - test-network

  # OWASP ZAP for security testing
  zap:
    image: owasp/zap2docker-stable
    container_name: test-zap
    ports:
      - "8080:8080"
    command: zap-webswing.sh
    networks:
      - test-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: test-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - test-network

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: test-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ../monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - test-network

  # Allure Report Server
  allure:
    image: frankescobar/allure-docker-service
    container_name: test-allure
    ports:
      - "5050:5050"
    environment:
      - CHECK_RESULTS_EVERY_SECONDS=3
      - KEEP_HISTORY=20
    volumes:
      - ../allure-results:/app/allure-results
      - ../allure-reports:/app/default-reports
    networks:
      - test-network

  # K6 for performance testing
  k6:
    image: grafana/k6:latest
    container_name: test-k6
    volumes:
      - ../tests/performance/k6:/scripts
    networks:
      - test-network
    command: run /scripts/load-test.js

  # Artillery for performance testing
  artillery:
    image: artilleryio/artillery:latest
    container_name: test-artillery
    volumes:
      - ../tests/performance/artillery:/scripts
    networks:
      - test-network
    command: run /scripts/load-test.yml

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog
    container_name: test-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - test-network

  # MinIO for S3-compatible storage testing
  minio:
    image: minio/minio
    container_name: test-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=testuser
      - MINIO_ROOT_PASSWORD=testpass123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - test-network

  # Elasticsearch for logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: test-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - test-network

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: test-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - test-network

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: test-jaeger
    ports:
      - "16686:16686"  # Web UI
      - "14268:14268"  # HTTP collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - test-network

  # Nginx for load balancing and reverse proxy
  nginx:
    image: nginx:alpine
    container_name: test-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../nginx/ssl:/etc/nginx/ssl
    depends_on:
      - test-app
    networks:
      - test-network

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  grafana_data:
  minio_data:
  elasticsearch_data:

networks:
  test-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16