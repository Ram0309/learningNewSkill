apiVersion: v1
kind: Namespace
metadata:
  name: test-automation
  labels:
    name: test-automation
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-hub
  namespace: test-automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: selenium-hub
  template:
    metadata:
      labels:
        app: selenium-hub
    spec:
      containers:
      - name: selenium-hub
        image: selenium/hub:4.15.0
        ports:
        - containerPort: 4444
        env:
        - name: GRID_MAX_SESSION
          value: "16"
        - name: GRID_BROWSER_TIMEOUT
          value: "300"
        - name: GRID_TIMEOUT
          value: "300"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /wd/hub/status
            port: 4444
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /wd/hub/status
            port: 4444
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: selenium-hub-service
  namespace: test-automation
spec:
  selector:
    app: selenium-hub
  ports:
  - port: 4444
    targetPort: 4444
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrome-nodes
  namespace: test-automation
spec:
  replicas: 10
  selector:
    matchLabels:
      app: chrome-node
  template:
    metadata:
      labels:
        app: chrome-node
    spec:
      containers:
      - name: chrome-node
        image: selenium/node-chrome:4.15.0
        env:
        - name: HUB_HOST
          value: "selenium-hub-service"
        - name: HUB_PORT
          value: "4444"
        - name: NODE_MAX_INSTANCES
          value: "2"
        - name: NODE_MAX_SESSION
          value: "2"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefox-nodes
  namespace: test-automation
spec:
  replicas: 5
  selector:
    matchLabels:
      app: firefox-node
  template:
    metadata:
      labels:
        app: firefox-node
    spec:
      containers:
      - name: firefox-node
        image: selenium/node-firefox:4.15.0
        env:
        - name: HUB_HOST
          value: "selenium-hub-service"
        - name: HUB_PORT
          value: "4444"
        - name: NODE_MAX_INSTANCES
          value: "2"
        - name: NODE_MAX_SESSION
          value: "2"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chrome-nodes-hpa
  namespace: test-automation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chrome-nodes
  minReplicas: 5
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: firefox-nodes-hpa
  namespace: test-automation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: firefox-nodes
  minReplicas: 3
  maxReplicas: 25
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80