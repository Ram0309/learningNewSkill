name: Unified Test Automation Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly tests at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ui
          - api
          - mobile
          - performance
          - security
          - database
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      parallel_jobs:
        description: 'Number of parallel jobs'
        required: false
        default: '4'
        type: string

env:
  NODE_VERSION: '18'
  PLAYWRIGHT_VERSION: '1.40.0'

jobs:
  # Setup and validation
  setup:
    runs-on: ubuntu-latest
    outputs:
      test-suite: ${{ steps.determine-suite.outputs.suite }}
      environment: ${{ steps.determine-env.outputs.env }}
      parallel-jobs: ${{ steps.determine-parallel.outputs.jobs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine test suite
        id: determine-suite
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "suite=${{ github.event.inputs.test_suite }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "suite=all" >> $GITHUB_OUTPUT
          else
            echo "suite=smoke" >> $GITHUB_OUTPUT
          fi

      - name: Determine environment
        id: determine-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
          fi

      - name: Determine parallel jobs
        id: determine-parallel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "jobs=${{ github.event.inputs.parallel_jobs }}" >> $GITHUB_OUTPUT
          else
            echo "jobs=4" >> $GITHUB_OUTPUT
          fi

  # Code quality and security checks
  code-quality:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format -- --check

      - name: TypeScript compilation check
        run: npm run build

      - name: Run unit tests
        run: npm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # UI Tests
  ui-tests:
    runs-on: ubuntu-latest
    needs: [setup, code-quality]
    if: contains(needs.setup.outputs.test-suite, 'ui') || needs.setup.outputs.test-suite == 'all'
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run UI tests
        run: |
          npx playwright test \
            --project=${{ matrix.browser }}-ui \
            --shard=${{ matrix.shard }}/${{ needs.setup.outputs.parallel-jobs }} \
            --grep="@ui"
        env:
          TEST_ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ui-test-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: |
            test-results/
            allure-results/
          retention-days: 7

  # API Tests
  api-tests:
    runs-on: ubuntu-latest
    needs: [setup, code-quality]
    if: contains(needs.setup.outputs.test-suite, 'api') || needs.setup.outputs.test-suite == 'all'
    strategy:
      matrix:
        shard: [1, 2]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: |
          npx playwright test \
            --project=api-tests \
            --shard=${{ matrix.shard }}/2 \
            --grep="@api"
        env:
          TEST_ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}

      - name: Upload API test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: api-test-results-${{ matrix.shard }}
          path: |
            test-results/
            allure-results/
          retention-days: 7

  # Mobile Tests
  mobile-tests:
    runs-on: ubuntu-latest
    needs: [setup, code-quality]
    if: contains(needs.setup.outputs.test-suite, 'mobile') || needs.setup.outputs.test-suite == 'all'
    strategy:
      matrix:
        device: [mobile-chrome, mobile-safari, tablet-ipad]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run mobile tests
        run: |
          npx playwright test \
            --project=${{ matrix.device }} \
            --grep="@mobile"
        env:
          TEST_ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload mobile test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: mobile-test-results-${{ matrix.device }}
          path: |
            test-results/
            allure-results/
          retention-days: 7

  # Performance Tests
  performance-tests:
    runs-on: ubuntu-latest
    needs: [setup, code-quality]
    if: contains(needs.setup.outputs.test-suite, 'performance') || needs.setup.outputs.test-suite == 'all'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Install Artillery
        run: npm install -g artillery@latest

      - name: Run Playwright performance tests
        run: |
          npx playwright test \
            --project=performance-tests \
            --grep="@performance"
        env:
          TEST_ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Run K6 load tests
        run: npm run test:k6
        env:
          TARGET_URL: ${{ secrets.BASE_URL }}

      - name: Run Artillery load tests
        run: npm run test:artillery
        env:
          TARGET_URL: ${{ secrets.BASE_URL }}

      - name: Upload performance test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-test-results
          path: |
            test-results/
            allure-results/
            k6-results/
            artillery-results/
          retention-days: 7

  # Security Tests
  security-tests:
    runs-on: ubuntu-latest
    needs: [setup, code-quality]
    if: contains(needs.setup.outputs.test-suite, 'security') || needs.setup.outputs.test-suite == 'all'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start OWASP ZAP
        run: |
          docker run -d --name zap \
            -p 8080:8080 \
            -v $(pwd):/zap/wrk/:rw \
            owasp/zap2docker-stable zap.sh -daemon -host 0.0.0.0 -port 8080

      - name: Wait for ZAP to start
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:8080 > /dev/null; do sleep 2; done'

      - name: Run security tests
        run: |
          npx playwright test \
            --project=security-tests \
            --grep="@security"
        env:
          TEST_ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          BASE_URL: ${{ secrets.BASE_URL }}
          ZAP_PROXY: http://localhost:8080

      - name: Run ZAP baseline scan
        run: npm run test:zap
        env:
          TARGET_URL: ${{ secrets.BASE_URL }}

      - name: Upload security test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-test-results
          path: |
            test-results/
            allure-results/
            zap-results/
          retention-days: 7

  # Database Tests
  database-tests:
    runs-on: ubuntu-latest
    needs: [setup, code-quality]
    if: contains(needs.setup.outputs.test-suite, 'database') || needs.setup.outputs.test-suite == 'all'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

      - name: Run database tests
        run: |
          npx playwright test \
            --project=database-tests \
            --grep="@database"
        env:
          TEST_ENVIRONMENT: test
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379

      - name: Upload database test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: database-test-results
          path: |
            test-results/
            allure-results/
          retention-days: 7

  # Cross-cloud execution tests
  cross-cloud-tests:
    runs-on: ubuntu-latest
    needs: [setup, code-quality]
    if: needs.setup.outputs.test-suite == 'all' && needs.setup.outputs.environment == 'production'
    strategy:
      matrix:
        cloud: [aws, azure, gcp]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure cloud credentials
        run: |
          case ${{ matrix.cloud }} in
            aws)
              echo "Configuring AWS credentials"
              aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws configure set region us-east-1
              ;;
            azure)
              echo "Configuring Azure credentials"
              az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}
              ;;
            gcp)
              echo "Configuring GCP credentials"
              echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > gcp-key.json
              gcloud auth activate-service-account --key-file gcp-key.json
              gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
              ;;
          esac

      - name: Deploy test infrastructure
        run: npm run deploy:${{ matrix.cloud }}
        env:
          CLOUD_PROVIDER: ${{ matrix.cloud }}

      - name: Run cross-cloud tests
        run: npm run test:${{ matrix.cloud }}
        env:
          CLOUD_PROVIDER: ${{ matrix.cloud }}
          TEST_ENVIRONMENT: ${{ needs.setup.outputs.environment }}

      - name: Cleanup cloud resources
        if: always()
        run: npm run cleanup:${{ matrix.cloud }}
        env:
          CLOUD_PROVIDER: ${{ matrix.cloud }}

      - name: Upload cross-cloud test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: cross-cloud-test-results-${{ matrix.cloud }}
          path: |
            test-results/
            allure-results/
          retention-days: 7

  # Generate and publish reports
  generate-reports:
    runs-on: ubuntu-latest
    needs: [ui-tests, api-tests, mobile-tests, performance-tests, security-tests, database-tests]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v3
        with:
          path: test-artifacts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Merge test results
        run: |
          mkdir -p merged-results/allure-results
          find test-artifacts -name "allure-results" -type d -exec cp -r {}/* merged-results/allure-results/ \;

      - name: Generate Allure report
        run: |
          npm install -g allure-commandline
          allure generate merged-results/allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Upload consolidated report
        uses: actions/upload-artifact@v3
        with:
          name: consolidated-test-report
          path: allure-report/
          retention-days: 30

  # Notify results
  notify-results:
    runs-on: ubuntu-latest
    needs: [generate-reports]
    if: always()
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#test-automation'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow

      - name: Notify Teams
        if: failure()
        uses: skitionek/notify-microsoft-teams@master
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK }}
          needs: ${{ toJson(needs) }}
          job: ${{ toJson(job) }}

      - name: Update test metrics
        run: |
          # Send metrics to monitoring system
          curl -X POST ${{ secrets.METRICS_ENDPOINT }} \
            -H "Authorization: Bearer ${{ secrets.METRICS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "test_run_id": "${{ github.run_id }}",
              "branch": "${{ github.ref }}",
              "commit": "${{ github.sha }}",
              "status": "${{ job.status }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'