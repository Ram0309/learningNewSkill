name: Registration UI Regression Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'unified-automation-framework/tests/registration/**'
      - 'unified-automation-framework/src/pages/registration-page.ts'
      - 'unified-automation-framework/test-data/registration.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'unified-automation-framework/tests/registration/**'
      - 'unified-automation-framework/src/pages/registration-page.ts'
      - 'unified-automation-framework/test-data/registration.json'
  schedule:
    # Run registration UI tests twice daily at 9 AM and 6 PM UTC
    - cron: '0 9,18 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - sit
          - preprod
          - prod
      browser:
        description: 'Browser to test'
        required: true
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

env:
  NODE_VERSION: '18'
  PLAYWRIGHT_VERSION: '1.40.0'

jobs:
  # Setup and determine test parameters
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.determine-env.outputs.env }}
      browser: ${{ steps.determine-browser.outputs.browser }}
      base-url: ${{ steps.determine-env.outputs.base-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment and base URL
        id: determine-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="prod"
          else
            ENV="sit"
          fi
          
          echo "env=$ENV" >> $GITHUB_OUTPUT
          
          case $ENV in
            dev)
              echo "base-url=https://dev.demowebshop.tricentis.com" >> $GITHUB_OUTPUT
              ;;
            sit)
              echo "base-url=https://sit.demowebshop.tricentis.com" >> $GITHUB_OUTPUT
              ;;
            preprod)
              echo "base-url=https://preprod.demowebshop.tricentis.com" >> $GITHUB_OUTPUT
              ;;
            prod)
              echo "base-url=https://demowebshop.tricentis.com" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Determine browser
        id: determine-browser
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "browser=${{ github.event.inputs.browser }}" >> $GITHUB_OUTPUT
          else
            echo "browser=chromium" >> $GITHUB_OUTPUT
          fi

  # Run Registration UI regression tests
  registration-ui-tests:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ needs.setup.outputs.browser == 'all' && fromJSON('["chromium", "firefox", "webkit"]') || fromJSON(format('["{0}"]', needs.setup.outputs.browser)) }}
        shard: [1, 2]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd unified-automation-framework
          npm ci

      - name: Install Playwright browsers
        run: |
          cd unified-automation-framework
          npx playwright install --with-deps ${{ matrix.browser }}

      - name: Setup test execution reporting
        run: |
          cd unified-automation-framework/test-execution-reporting
          npm ci
          npm run setup:db

      - name: Run Registration UI regression tests
        id: run-tests
        run: |
          cd unified-automation-framework
          
          # Run only Registration UI tests with @regression @ui tags
          TEST_CMD="npx playwright test tests/registration/registration.spec.ts --grep '@regression.*@ui' --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/2"
          
          echo "🚀 Executing Registration UI Tests: $TEST_CMD"
          echo "🌍 Environment: ${{ needs.setup.outputs.environment }}"
          echo "🔗 Base URL: ${{ needs.setup.outputs.base-url }}"
          echo "🎯 Focus: Registration UI scenarios only"
          
          # Run tests and capture exit code
          set +e
          $TEST_CMD
          TEST_EXIT_CODE=$?
          set -e
          
          echo "test-exit-code=$TEST_EXIT_CODE" >> $GITHUB_OUTPUT
          
          # Tests can fail but we still want to process results
          exit 0
        env:
          TEST_ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          BASE_URL: ${{ needs.setup.outputs.base-url }}
          BROWSER: ${{ matrix.browser }}
          REPORTING_ENABLED: 'true'
          REPORTING_STORAGE_TYPE: 'sqlite'
          PROJECT_NAME: 'Registration UI Regression Tests'
          SQUAD_NAME: 'QA-Registration-Team'
          CI: true

      - name: Generate Registration UI test report
        if: always()
        run: |
          cd unified-automation-framework/test-execution-reporting
          
          # Generate Excel report for Registration UI tests
          npx test-execution-reporting export \
            --format excel \
            --output "reports/excel/registration-ui-report-${{ matrix.browser }}-shard${{ matrix.shard }}-$(date +%Y%m%d-%H%M%S).xlsx" \
            --environment "${{ needs.setup.outputs.environment }}" \
            --project "Registration UI Regression Tests" \
            --filter "testSuite=User Registration Tests"
          
          # Generate CSV report for Registration UI tests
          npx test-execution-reporting export \
            --format csv \
            --output "reports/csv/registration-ui-report-${{ matrix.browser }}-shard${{ matrix.shard }}-$(date +%Y%m%d-%H%M%S).csv" \
            --environment "${{ needs.setup.outputs.environment }}" \
            --project "Registration UI Regression Tests" \
            --filter "testSuite=User Registration Tests"
          
          # Generate focused dashboard for Registration UI
          npx test-execution-reporting dashboard:build --filter "registration"

      - name: Upload Registration UI test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: registration-ui-results-${{ matrix.browser }}-shard${{ matrix.shard }}-${{ github.run_number }}
          path: |
            unified-automation-framework/test-results/
            unified-automation-framework/playwright-report/
            unified-automation-framework/allure-results/
            unified-automation-framework/test-execution-reporting/reports/
            unified-automation-framework/test-execution-reporting/data/
            unified-automation-framework/screenshots/
            unified-automation-framework/videos/
          retention-days: 30

      - name: Upload Registration UI execution database
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: registration-ui-database-${{ matrix.browser }}-shard${{ matrix.shard }}-${{ github.run_number }}
          path: unified-automation-framework/test-execution-reporting/data/execution-history.db
          retention-days: 90

  # Consolidate Registration UI results
  consolidate-registration-results:
    runs-on: ubuntu-latest
    needs: [setup, registration-ui-tests]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download all Registration UI test artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Install dependencies
        run: |
          cd unified-automation-framework/test-execution-reporting
          npm ci

      - name: Consolidate Registration UI execution databases
        run: |
          cd unified-automation-framework/test-execution-reporting
          node scripts/consolidate-results.js ../../artifacts/ --filter="registration"

      - name: Generate consolidated Registration UI reports
        run: |
          cd unified-automation-framework/test-execution-reporting
          
          # Generate consolidated Excel report for Registration UI
          npx test-execution-reporting export \
            --format excel \
            --output "reports/excel/consolidated-registration-ui-report-$(date +%Y%m%d-%H%M%S).xlsx" \
            --filter "testSuite=User Registration Tests"
          
          # Generate Registration UI trend analysis
          npm run generate:trends -- \
            --days=30 \
            --output="reports/trends/registration-ui-trend-analysis-$(date +%Y%m%d-%H%M%S).json" \
            --filter="registration"
          
          # Generate Registration UI focused dashboard
          npm run dashboard:build -- --title="Registration UI Regression Dashboard" --filter="registration"

      - name: Generate Registration UI Allure report
        run: |
          # Install Allure
          npm install -g allure-commandline
          
          # Merge all Registration UI allure results
          mkdir -p consolidated-registration-allure-results
          find artifacts -name "allure-results" -type d -exec cp -r {}/* consolidated-registration-allure-results/ \; 2>/dev/null || true
          
          # Generate Allure report for Registration UI
          if [ "$(ls -A consolidated-registration-allure-results)" ]; then
            allure generate consolidated-registration-allure-results -o registration-allure-report --clean
            
            # Customize Allure report title
            sed -i 's/<title>Allure Report<\/title>/<title>Registration UI Regression Report<\/title>/g' registration-allure-report/index.html 2>/dev/null || true
          else
            echo "No Registration UI Allure results found, creating empty report"
            mkdir -p registration-allure-report
            echo "<h1>No Registration UI test results available</h1>" > registration-allure-report/index.html
          fi

      - name: Create Registration UI test summary
        run: |
          cd unified-automation-framework/test-execution-reporting
          
          # Count test results from database
          TOTAL_TESTS=$(sqlite3 data/consolidated-execution-history.db "SELECT COUNT(*) FROM test_results WHERE testSuite LIKE '%Registration%';" 2>/dev/null || echo "0")
          PASSED_TESTS=$(sqlite3 data/consolidated-execution-history.db "SELECT COUNT(*) FROM test_results WHERE testSuite LIKE '%Registration%' AND status='Passed';" 2>/dev/null || echo "0")
          FAILED_TESTS=$(sqlite3 data/consolidated-execution-history.db "SELECT COUNT(*) FROM test_results WHERE testSuite LIKE '%Registration%' AND status='Failed';" 2>/dev/null || echo "0")
          SKIPPED_TESTS=$(sqlite3 data/consolidated-execution-history.db "SELECT COUNT(*) FROM test_results WHERE testSuite LIKE '%Registration%' AND status='Skipped';" 2>/dev/null || echo "0")
          
          # Calculate pass rate
          if [ "$TOTAL_TESTS" -gt 0 ]; then
            PASS_RATE=$(echo "scale=1; $PASSED_TESTS * 100 / $TOTAL_TESTS" | bc 2>/dev/null || echo "0.0")
          else
            PASS_RATE="0.0"
          fi
          
          # Generate Registration UI test summary
          cat > registration-ui-test-summary.md << EOF
          # 🎯 Registration UI Regression Test Summary
          
          **Execution Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")  
          **Environment:** ${{ needs.setup.outputs.environment }}  
          **Base URL:** ${{ needs.setup.outputs.base-url }}  
          **Focus:** Registration UI scenarios only (@regression @ui)  
          **Browser(s):** ${{ needs.setup.outputs.browser }}  
          **GitHub Run:** [\#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ## 📊 Test Results Summary
          
          | Metric | Count | Percentage |
          |--------|-------|------------|
          | **Total Tests** | $TOTAL_TESTS | 100% |
          | **✅ Passed** | $PASSED_TESTS | ${PASS_RATE}% |
          | **❌ Failed** | $FAILED_TESTS | $(echo "scale=1; $FAILED_TESTS * 100 / $TOTAL_TESTS" | bc 2>/dev/null || echo "0.0")% |
          | **⏭️ Skipped** | $SKIPPED_TESTS | $(echo "scale=1; $SKIPPED_TESTS * 100 / $TOTAL_TESTS" | bc 2>/dev/null || echo "0.0")% |
          
          ## 🎯 Test Coverage Areas
          
          - ✅ **Valid Registration Scenarios** - Happy path testing
          - ❌ **Invalid Registration Scenarios** - Negative testing
          - 🔄 **Edge Case Testing** - Boundary value testing
          - 📝 **Form Validation** - Field validation and interaction
          - 🎨 **UI/UX Testing** - User interface and experience
          - 🔒 **Security Testing** - XSS, SQL injection, CSRF protection
          - ⚡ **Performance Testing** - Page load and form submission
          - ♿ **Accessibility Testing** - WCAG compliance and keyboard navigation
          - 🌐 **Cross-Browser Testing** - Multi-browser compatibility
          
          ## 📈 Key Metrics
          
          - **Pass Rate:** ${PASS_RATE}%
          - **Total Shards:** 2 per browser
          - **Parallel Execution:** Yes
          - **Test Tags:** @regression @ui
          - **Reporting System:** SQLite + Dashboard + Allure
          
          ## 📁 Available Reports
          
          1. **📊 Excel Report:** Comprehensive test results with filtering and pivot tables
          2. **📋 CSV Export:** Raw data for custom analysis and integration
          3. **📈 Interactive Dashboard:** Real-time metrics, charts, and trend analysis
          4. **🎯 Allure Report:** Detailed test execution report with screenshots and videos
          5. **🗄️ SQLite Database:** Complete execution history for data analysis
          
          ## 🔗 Quick Access Links
          
          - [📊 Allure Report](./registration-allure-report/index.html)
          - [📈 Interactive Dashboard](./dashboard/index.html)
          - [🗄️ Consolidated Database](./data/consolidated-execution-history.db)
          - [📁 All Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ## 🚀 Next Steps
          
          $(if [ "$FAILED_TESTS" -gt 0 ]; then
            echo "- 🔍 **Investigate Failed Tests:** Review failure details in Allure report"
            echo "- 🐛 **Bug Triage:** Create issues for legitimate bugs found"
            echo "- 🔧 **Test Maintenance:** Update test data or selectors if needed"
            echo "- 🔄 **Re-run Tests:** Execute failed tests after fixes"
          else
            echo "- ✅ **All Tests Passed:** Registration UI is stable"
            echo "- 📈 **Monitor Trends:** Check for performance degradation"
            echo "- 🔄 **Continuous Monitoring:** Keep running scheduled tests"
          fi)
          
          ---
          *Generated by Registration UI Regression Test Pipeline*  
          *Framework: Enterprise Test Automation Framework*  
          *Team: QA-Registration-Team*
          EOF

      - name: Upload consolidated Registration UI results
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-registration-ui-report-${{ github.run_number }}
          path: |
            unified-automation-framework/test-execution-reporting/reports/
            unified-automation-framework/test-execution-reporting/data/
            unified-automation-framework/test-execution-reporting/dashboard/
            registration-allure-report/
            unified-automation-framework/test-execution-reporting/registration-ui-test-summary.md
          retention-days: 90

      - name: Deploy Registration UI reports to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./registration-allure-report
          destination_dir: registration-ui-reports/${{ github.run_number }}

  # Generate and send Registration UI notifications
  notify-registration-results:
    runs-on: ubuntu-latest
    needs: [setup, registration-ui-tests, consolidate-registration-results]
    if: always()
    steps:
      - name: Calculate Registration UI test results summary
        id: summary
        run: |
          # This would normally parse the actual test results from the database
          # For now, we'll create a summary based on job status
          
          if [ "${{ needs.registration-ui-tests.result }}" = "success" ]; then
            echo "overall-status=✅ PASSED" >> $GITHUB_OUTPUT
            echo "status-emoji=✅" >> $GITHUB_OUTPUT
            echo "status-color=28a745" >> $GITHUB_OUTPUT
          else
            echo "overall-status=❌ FAILED" >> $GITHUB_OUTPUT
            echo "status-emoji=❌" >> $GITHUB_OUTPUT
            echo "status-color=dc3545" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR with Registration UI results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `
            ## ${{ steps.summary.outputs.status-emoji }} Registration UI Regression Test Results
            
            **Environment:** ${{ needs.setup.outputs.environment }}  
            **Browser:** ${{ needs.setup.outputs.browser }}  
            **Focus:** Registration UI scenarios only (@regression @ui)  
            **Execution ID:** ${{ github.run_number }}
            
            ### 🎯 Test Scope
            - ✅ Valid Registration Scenarios
            - ❌ Invalid Registration Scenarios  
            - 🔄 Edge Case Testing
            - 📝 Form Validation
            - 🎨 UI/UX Testing
            - 🔒 Security Testing
            - ⚡ Performance Testing
            - ♿ Accessibility Testing
            - 🌐 Cross-Browser Testing
            
            ### 📊 Overall Status
            | Status | Result |
            |--------|--------|
            | **Registration UI Tests** | ${{ steps.summary.outputs.overall-status }} |
            | **Environment** | ${{ needs.setup.outputs.environment }} |
            | **Browser Coverage** | ${{ needs.setup.outputs.browser }} |
            
            ### 📁 Generated Reports
            - 🎯 [Registration UI Allure Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - 📊 [Excel Report with Filtering](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - 📈 [Interactive Dashboard](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - 🗄️ [SQLite Database](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### 🔗 Quick Links
            - [📋 View Full Results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [📁 Download All Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [📊 GitHub Pages Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/registration-ui-reports/${{ github.run_number }}/)
            
            ---
            *🤖 Automated Registration UI testing powered by Enterprise Test Automation Framework*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Create issue on Registration UI failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${{ github.run_id }}`;
            
            await github.rest.issues.create({
              owner,
              repo,
              title: `🚨 Registration UI Tests Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `
              ## 🎯 Registration UI Test Failure Alert
              
              **Environment:** ${{ needs.setup.outputs.environment }}  
              **Browser:** ${{ needs.setup.outputs.browser }}  
              **Focus:** Registration UI scenarios (@regression @ui)  
              **Trigger:** ${{ github.event_name }}  
              **Branch:** ${{ github.ref_name }}  
              
              **Run Details:** ${runUrl}
              
              ### 🎯 Failed Test Areas
              The following Registration UI areas may be affected:
              - 📝 User Registration Form
              - 🔐 Authentication Flow
              - 📊 Form Validation
              - 🎨 UI Components
              - 🔒 Security Controls
              - ⚡ Performance Metrics
              
              ### 🔍 Investigation Checklist
              - [ ] Review Registration UI test execution logs
              - [ ] Check demo website availability: https://demowebshop.tricentis.com/register
              - [ ] Analyze failure patterns in Allure report
              - [ ] Verify test data validity
              - [ ] Check for UI element changes
              - [ ] Validate environment configuration
              - [ ] Review browser compatibility issues
              - [ ] Update selectors if needed
              - [ ] Fix failing test scenarios
              - [ ] Re-run Registration UI test suite
              
              ### 📊 Impact Assessment
              - **Critical:** Registration functionality may be broken
              - **User Impact:** New user registration may be affected
              - **Business Impact:** User acquisition may be impacted
              
              ### 📁 Available Debugging Resources
              - [🎯 Registration UI Allure Report](${runUrl})
              - [📊 Detailed Excel Report](${runUrl})
              - [🗄️ Execution Database](${runUrl})
              - [📸 Screenshots & Videos](${runUrl})
              - [📈 Trend Analysis](${runUrl})
              
              ### 🚀 Resolution Steps
              1. **Immediate:** Check if this is a test environment issue
              2. **Analysis:** Review failed test details in Allure report
              3. **Triage:** Determine if it's a product bug or test issue
              4. **Fix:** Address the root cause
              5. **Verify:** Re-run the Registration UI test suite
              6. **Monitor:** Ensure stability in subsequent runs
              
              **Priority:** High - Registration is a critical user journey
              
              **Auto-generated by Registration UI Test Pipeline**
              `,
              labels: ['bug', 'registration-ui-failure', 'automation', 'high-priority', 'critical-path']
            });

      - name: Send Slack notification (if configured)
        if: always()
        run: |
          # Send notification to Slack channel (if webhook is configured)
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "text": "🎯 Registration UI Regression Tests ${{ steps.summary.outputs.overall-status }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ steps.summary.outputs.status-emoji }} Registration UI Test Results"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Environment:* ${{ needs.setup.outputs.environment }}"
                      },
                      {
                        "type": "mrkdwn", 
                        "text": "*Browser:* ${{ needs.setup.outputs.browser }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Status:* ${{ steps.summary.outputs.overall-status }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Run:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>"
                      }
                    ]
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "🎯 *Focus:* Registration UI scenarios only (@regression @ui)\n📊 *Reports:* Allure, Excel, Dashboard, SQLite database available"
                    }
                  }
                ]
              }' \
              ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification failed (non-critical)"
          else
            echo "Slack webhook not configured, skipping notification"
          fi

      - name: Update Registration UI status badge
        if: github.ref == 'refs/heads/main'
        run: |
          # This would update a status badge specifically for Registration UI tests
          echo "Updating Registration UI test status badge..."
          echo "Status: ${{ steps.summary.outputs.overall-status }}"
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo "Focus: Registration UI (@regression @ui)"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Color: ${{ steps.summary.outputs.status-color }}"